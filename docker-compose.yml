services:
  postgres:
    image: postgres:16
    container_name: benchmark-postgres
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-benchmark}
      POSTGRES_USER: ${POSTGRES_USER:-benchmark}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD in .env}
    volumes:
      - benchmark-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-benchmark} -d ${POSTGRES_DB:-benchmark}"]
      interval: 5s
      timeout: 5s
      retries: 12
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.2.1
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.2.1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_LISTENERS: INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

  spark-master:
    image: spark:3.5.8-scala2.12-java11-r-ubuntu
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.master.Master --host spark-master
    depends_on:
      - kafka
    environment:
      - HOME=/tmp
      - SPARK_LOCAL_IP=spark-master
      - SPARK_MASTER_HOST=spark-master
    ports:
      - "7077:7077"
      - "8080:8080"
    volumes:
      - /tmp/gsdgrad02-compose/jobs:/opt/benchmark/jobs
      - /tmp/gsdgrad02-compose/results:/opt/benchmark/results

  spark-worker:
    image: spark:3.5.8-scala2.12-java11-r-ubuntu
    command: /opt/spark/bin/spark-class org.apache.spark.deploy.worker.Worker spark://spark-master:7077 --webui-port 8082 --cores ${SPARK_WORKER_CORES:-1} --memory ${SPARK_WORKER_MEMORY:-1024M}
    scale: ${SPARK_WORKER_SCALE:-4}
    depends_on:
      - spark-master
    environment:
      - HOME=/tmp
      - SPARK_WORKER_TIMEOUT=120
    expose:
      - "8082"
    volumes:
      - /tmp/gsdgrad02-compose/jobs:/opt/benchmark/jobs
      - /tmp/gsdgrad02-compose/results:/opt/benchmark/results

  jobmanager:
    build:
      context: ./docker/flink
    image: projeto-ssc0904-grupo02-pyflink:1.18.1
    pull_policy: build
    ports:
      - "8081:8081"
    command: jobmanager
    environment:
      - JOB_MANAGER_RPC_ADDRESS=jobmanager
    depends_on:
      - kafka
    volumes:
      - /tmp/gsdgrad02-compose/jobs:/opt/benchmark/jobs
      - /tmp/gsdgrad02-compose/results:/opt/benchmark/results

  taskmanager:
    build:
      context: ./docker/flink
    image: projeto-ssc0904-grupo02-pyflink:1.18.1
    pull_policy: build
    command: taskmanager
    scale: ${FLINK_TASKMANAGER_SCALE:-4}
    environment:
      - JOB_MANAGER_RPC_ADDRESS=jobmanager
      - |
        FLINK_PROPERTIES=
        taskmanager.memory.process.size: ${FLINK_TASKMANAGER_MEMORY:-1024m}
        taskmanager.numberOfTaskSlots: ${FLINK_TASKMANAGER_SLOTS:-1}
    depends_on:
      - jobmanager
    volumes:
      - /tmp/gsdgrad02-compose/jobs:/opt/benchmark/jobs
      - /tmp/gsdgrad02-compose/results:/opt/benchmark/results

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.47.0
    container_name: cadvisor
    ports:
      - "8085:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    privileged: true
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v2.45.0
    container_name: prometheus
    extra_hosts:
      - "host.docker.internal:host-gateway"
    ports:
      - "9090:9090"
    volumes:
      - ./docker/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
    depends_on:
      - cadvisor
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.1.0
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
    depends_on:
      - prometheus
    restart: unless-stopped

volumes:
  benchmark-postgres-data:
