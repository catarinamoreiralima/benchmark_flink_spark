global:
  scrape_interval: 5s      
  evaluation_interval: 5s  

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']

  - job_name: 'python-collector'
    static_configs:
      - targets: ['host.docker.internal:8000'] # Porta onde vamos expor a Latência
